<!DOCTYPE html>
<html lang="se">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3amos Pizza — Beställ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/general.css"/>
    <link rel="stylesheet" href="./styles/order-page-style.css">
  </head>
  <body>

    <!-- NAV -->
    <nav class="navbar navbar-expand-sm fixed-top navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="./index.html">
          <img src="./media/logo-colored-transparent.webp" width="72" alt="3amos Pizza logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
          data-bs-target="#mainNav" aria-controls="mainNav"
          aria-expanded="false" aria-label="Öppna meny">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item"><a class="nav-link" href="./index.html">Hem</a></li>
            <li class="nav-item"><a class="nav-link active" href="./order.html">Beställ</a></li>
            <li class="nav-item"><a class="nav-link" href="./about.html">Om oss</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- PAGE BANNER -->
    <div class="page-banner">
      <div class="page-banner-content container">
        <div class="breadcrumb-custom">Hem / Beställ</div>
        <h1>Vår Meny</h1>
      </div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-section container" id="filterSection">
      <button class="filter-btn active" data-filter="all">Alla rätter</button>
      <button class="filter-btn" data-filter="pizza">Pizzor</button>
      <button class="filter-btn" data-filter="plate">Tallrikar</button>
    </div>

    <!-- MENU GRID -->
    <main class="menu-section">
      <div class="container">
        <div class="menu-grid" id="plateMenus"></div>
      </div>
    </main>

    <!-- CART FAB -->
    <button class="cart-fab hidden" id="cartFab"
      data-bs-toggle="offcanvas" data-bs-target="#order-checkout"
      aria-label="Öppna varukorg">
      <span class="cart-fab-icon">🛒</span>
      <span>Varukorg</span>
      <span class="cart-fab-count" id="itemsInBasket">0</span>
    </button>

    <!-- CART OFFCANVAS -->
    <div class="offcanvas offcanvas-end" id="order-checkout" tabindex="-1">
      <div class="offcanvas-header">
        <h2 class="offcanvas-title">Din beställning</h2>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Stäng"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-0">

        <div id="cartCheckOutInfoList" style="flex:1;overflow-y:auto;padding-bottom:0.5rem;">
          <div class="cart-empty">
            <span class="cart-empty-icon">🛒</span>
            <p>Din varukorg är tom</p>
          </div>
        </div>

        <div>
          <div class="cart-total-box">
            <div class="cart-total-label">Totalt att betala</div>
            <div class="cart-total-amount" id="price">0 SEK</div>
          </div>
          <button class="btn-order" id="orderBtn">Bekräfta beställning</button>
          <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
              <strong class="me-auto">3amos Pizza</strong>
              <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Stäng"></button>
            </div>
            <div class="toast-body">
              <p id="orderInfo"></p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer-custom">
      <div class="container">
        <div class="row align-items-center gy-3">
          <div class="col-md-3 text-center text-md-start">
            <a href="./index.html">
              <img src="./media/logo-colored-transparent.webp" width="68" alt="3amos logo" class="footer-logo">
            </a>
          </div>
          <div class="col-md-6 text-center">
            <p class="mb-1"><a href="mailto:3amos@pizza.nu" class="footer-link">3amos@pizza.nu</a></p>
            <p class="mb-0"><a href="tel:0700001337" class="footer-link">070 000 1337</a></p>
          </div>
          <div class="col-md-3 text-center text-md-end">
            <span class="footer-muted">&copy; 2024 3amos Pizza</span>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/shop.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
